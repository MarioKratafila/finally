version: '3.8'
services:
  app:
    image: finally
    ports:
      - "8000:8000"
    volumes:
      - test-data:/app/db
    environment:
      - LLM_MOCK=true
      - OPENROUTER_API_KEY=mock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  playwright:
    image: mcr.microsoft.com/playwright:v1.45.0-jammy
    depends_on:
      app:
        condition: service_healthy
    working_dir: /tests
    volumes:
      - ./:/tests
    environment:
      - BASE_URL=http://app:8000
    command: ["npx", "playwright", "test"]

volumes:
  test-data:
